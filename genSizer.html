<!DOCTYPE html>
<html lang="zh-TW">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極致美感圖片生成器 Pro v3</title>
    <style>
      :root {
        --bg: #050505;
        --card-bg: #111;
        --accent: #007aff;
        --input-bg: #1d1d1f;
        --text: #ffffff;
        --text-dim: #666;
      }

      * {
        box-sizing: border-box;
        font-family: -apple-system, "SF Pro Display", "PingFang TC", sans-serif;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* 控制面板 */
      .toolbar {
        background-color: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(20px);
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
        gap: 16px;
        border-bottom: 1px solid #222;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field label {
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* 自定義 Stepper */
      .stepper {
        display: flex;
        background: var(--input-bg);
        border: 1px solid #333;
        border-radius: 8px;
        height: 44px;
        align-items: center;
        transition: 0.2s;
      }

      .stepper:focus-within {
        border-color: var(--accent);
      }

      .stepper button {
        width: 40px;
        height: 100%;
        background: transparent;
        border: none;
        color: var(--text-dim);
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stepper button:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
      }

      .stepper input {
        width: 70px;
        background: transparent;
        border: none;
        color: white;
        text-align: center;
        font-size: 15px;
        font-weight: 500;
        outline: none;
      }

      /* 隱藏原生箭頭 */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type=number] {
        -moz-appearance: textfield;
      }

      select.control-item {
        background: var(--input-bg);
        border: 1px solid #333;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        height: 44px;
        padding: 0 40px 0 16px;
        outline: none;
        appearance: none;
        cursor: pointer;
        min-width: 180px;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 14px;
      }

      .btn-action {
        height: 44px;
        padding: 0 28px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .primary:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }

      .secondary {
        background: #222;
        color: white;
        border: 1px solid #333;
      }

      .secondary:hover {
        background: #333;
      }

      /* 預覽區 */
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .art-card {
        background: var(--card-bg);
        padding: 50px;
        border-radius: 40px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        border: 1px solid #222;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .canvas-frame {
        background: #fff;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
        line-height: 0;
        display: block;
      }

      .info-badge {
        font-size: 11px;
        background: #1d1d1f;
        padding: 8px 20px;
        border-radius: 100px;
        color: var(--text-dim);
        border: 1px solid #333;
      }
    </style>
  </head>

  <body>

    <div class="toolbar">
      <div class="field">
        <label>Width</label>
        <div class="stepper">
          <button onclick="changeVal('w', -50)">−</button>
          <input id="w" type="number" placeholder="寬度" onchange="render()" />
          <button onclick="changeVal('w', 50)">+</button>
        </div>
      </div>
      <div class="field">
        <label>Height</label>
        <div class="stepper">
          <button onclick="changeVal('h', -50)">−</button>
          <input id="h" type="number" placeholder="高度" onchange="render()" />
          <button onclick="changeVal('h', 50)">+</button>
        </div>
      </div>
      <div class="field">
        <label>Format</label>
        <select id="format" class="control-item" onchange="render()">
          <option value="" selected>請選擇格式</option>
          <option value="svg">SVG (Vector)</option>
          <option value="png">PNG (Lossless)</option>
          <option value="jpg">JPG (Photo)</option>
          <option value="webp">WebP (Modern)</option>
        </select>
      </div>
      <div class="btn-group">
        <button onclick="render()" class="btn-action primary">重新生成</button>
        <button onclick="download()" class="btn-action secondary">下載檔案</button>
      </div>
    </div>

    <div class="viewport">
      <div class="art-card">
        <div class="canvas-frame" id="display"></div>
        <div class="info-badge" id="label">READY</div>
      </div>
    </div>

    <script>
      const display = document.getElementById("display");
      const label = document.getElementById("label");

      // Some browsers restore the page from bfcache when navigating back,
      // which can skip a fresh load lifecycle for this view.
      window.addEventListener("load", resetState);
      window.addEventListener("pageshow", resetState);

      function resetState() {
        document.getElementById("w").value = "";
        document.getElementById("h").value = "";
        document.getElementById("format").value = "";
        display.innerHTML = "";
        label.innerText = "READY";
      }

      function changeVal(id, offset) {
        const el = document.getElementById(id);
        const current = parseInt(el.value);
        const safeCurrent = Number.isFinite(current) ? current : 0;
        el.value = Math.max(10, safeCurrent + offset);
        render();
      }

      function getArtData(w, h) {
        const hue = Math.random() * 360;
        return {
          hue,
          shapes: Array.from({ length: 4 }, (_, i) => ({
            x: Math.random() * w,
            y: Math.random() * h,
            r: (0.2 + Math.random() * 0.3) * w,
            c: `hsla(${(hue + i * 45) % 360}, 70%, 65%, 0.4)`
          }))
        };
      }

      function generateSVG(w, h) {
        const art = getArtData(w, h);
        let content = `<rect width="100%" height="100%" fill="#ffffff"/>`;
        art.shapes.forEach(s => {
          content += `<circle cx="${s.x}" cy="${s.y}" r="${s.r}" fill="${s.c}"/>`;
        });

        const fontSize = Math.floor(w / 6.5);
        // 精準垂直置中寫法：dominant-baseline="central"
        content += `<text x="50%" y="50%" fill="rgba(0,0,0,0.8)" font-size="${fontSize}" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" dominant-baseline="central">${w}x${h}</text>`;

        return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${content}</svg>`;
      }

      function generateCanvas(w, h) {
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        const art = getArtData(w, h);

        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);

        art.shapes.forEach(s => {
          ctx.fillStyle = s.c;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
        });

        const fontSize = Math.floor(w / 6.5);
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.font = `900 ${fontSize}px "Arial Black", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle"; // Canvas 置中
        ctx.fillText(`${w}x${h}`, w / 2, h / 2);

        return canvas;
      }

      function render() {
        const w = parseInt(document.getElementById("w").value);
        const h = parseInt(document.getElementById("h").value);
        const format = document.getElementById("format").value;

        if (!Number.isFinite(w) || !Number.isFinite(h) || !format) {
          display.innerHTML = "";
          label.innerText = "READY";
          return;
        }

        display.innerHTML = "";
        if (format === 'svg') {
          display.innerHTML = generateSVG(w, h);
        } else {
          display.appendChild(generateCanvas(w, h));
        }
        label.innerText = `SPECS: ${w} × ${h} • ${format.toUpperCase()}`;
      }

      function download() {
        const w = parseInt(document.getElementById("w").value);
        const h = parseInt(document.getElementById("h").value);
        const format = document.getElementById("format").value;

        if (!Number.isFinite(w) || !Number.isFinite(h) || !format) {
          alert("請先輸入寬高並選擇格式");
          return;
        }

        if (format === 'svg') {
          const blob = new Blob([generateSVG(w, h)], { type: "image/svg+xml" });
          save(blob, `img_${w}x${h}.svg`);
        } else {
          const canvas = generateCanvas(w, h);
          const mime = format === 'jpg' ? 'image/jpeg' : `image/${format}`;
          canvas.toBlob(b => save(b, `img_${w}x${h}.${format}`), mime, 0.95);
        }
      }

      function save(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = name; a.click();
        URL.revokeObjectURL(url);
      }
    </script>
  </body>

</html>
